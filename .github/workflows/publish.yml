name: Publish Container Image

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./application/package-lock.json

      - name: Install dependencies and build application
        working-directory: ./application
        run: |
          npm ci
          # Get libsql version from package-lock.json (it's a transitive dependency of @libsql/client)
          LIBSQL_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/libsql'].version")
          echo "Installing Alpine (musl) native modules version: $LIBSQL_VERSION"
          # Explicitly install Alpine (musl) and ARM native modules for multi-platform support
          npm install --no-save --force @libsql/linux-x64-musl@$LIBSQL_VERSION @libsql/linux-arm64-musl@$LIBSQL_VERSION
          npm run build
          # Manually copy platform-specific native modules to output (Nitro doesn't auto-include them)
          echo "Copying Alpine native modules to output..."
          if [ -d "node_modules/@libsql/linux-x64-musl" ]; then
            mkdir -p .output/server/node_modules/@libsql/linux-x64-musl
            cp -r node_modules/@libsql/linux-x64-musl/* .output/server/node_modules/@libsql/linux-x64-musl/
            echo "✓ Copied linux-x64-musl"
          else
            echo "⚠ Warning: linux-x64-musl module not found"
            exit 1
          fi
          if [ -d "node_modules/@libsql/linux-arm64-musl" ]; then
            mkdir -p .output/server/node_modules/@libsql/linux-arm64-musl
            cp -r node_modules/@libsql/linux-arm64-musl/* .output/server/node_modules/@libsql/linux-arm64-musl/
            echo "✓ Copied linux-arm64-musl"
          else
            echo "⚠ Warning: linux-arm64-musl module not found"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Display image size and details
        run: |
          echo "## Container Image Published :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Information" >> $GITHUB_STEP_SUMMARY
          echo "Image digest: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull the Image" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Run the Container" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker run -p 3000:3000 -v \$(pwd)/.data:/app/.data ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
